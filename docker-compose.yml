version: "3.9"

services:
  bot:
    build: .
    container_name: prime_energy_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data        # SQLite database
      - ./logs:/app/logs        # Log fayllari
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/prime_energy.db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

